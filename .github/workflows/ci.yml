name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: |
          python -B -m compileall custom_components tests

      - name: Lint with Ruff
        run: |
          python -m ruff check --no-cache custom_components tests scripts

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in [
              Path("custom_components/edf_kraken/manifest.json"),
              Path("custom_components/edf_kraken/strings.json"),
              Path("hacs.json"),
          ]:
              json.loads(path.read_text(encoding="utf-8"))
              print(f"{path}: ok")
          PY

      - name: Validate HACS repository shape
        run: |
          python scripts/validate_hacs.py

      - name: Run tests
        run: |
          python -B -m pytest tests
