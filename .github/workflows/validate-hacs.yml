name: HACS Validation

on:
  pull_request:
    paths:
      - "custom_components/**"
      - "hacs.json"
      - ".github/workflows/validate-hacs.yml"
      - "scripts/validate_hacs.py"
  push:
    branches:
      - main
    paths:
      - "custom_components/**"
      - "hacs.json"
      - ".github/workflows/validate-hacs.yml"
      - "scripts/validate_hacs.py"

permissions:
  contents: read

jobs:
  validate:
    name: Validate HACS metadata
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate HACS repository shape
        run: |
          python scripts/validate_hacs.py
